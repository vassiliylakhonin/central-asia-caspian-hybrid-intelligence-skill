name: validate

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  basic-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f README.md
          test -f skills/codex/SKILL.md
          test -f skills/claude/SKILL.md
